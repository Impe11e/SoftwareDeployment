version: '3.8'
services:
  db:
    image: postgres:15
    container_name: lab2_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mywebapp_db
    volumes:
      - lab2_db_data:/var/lib/postgresql/data
    networks:
      - lab2_net

  web:
    build: .
    container_name: lab2_app
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=app
      - DB_PASSWORD=password
      - DB_NAME=mywebapp_db
    depends_on:
      - db
    networks:
      - lab2_net

  nginx:
    image: nginx:latest
    container_name: lab2_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf.docker:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lab2_net

networks:
  lab2_net:
    driver: bridge

volumes:
  lab2_db_data: